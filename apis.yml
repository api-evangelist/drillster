apis:
  - aid: drillster:drillster-api
    name: Drillster API
    description: >-
      The Drillster REST API (v2.1.1) lets developers integrate Drillster's
      adaptive learning and training platform into external applications. It
      supports user account provisioning, group assignment, progress and
      results retrieval, event notifications via webhooks, and service account
      management.
